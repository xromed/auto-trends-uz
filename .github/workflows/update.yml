name: Обновление дашборда

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install pytrends

      - name: Генерация дашборда
        run: python generate.py

      - name: Коммит и пуш
        run: |
          git config user.name "auto-trends-bot"
          git config user.email "bot@noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Обновление $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
